- name: Configure Minecraft Server
  hosts: servers
  become: yes # run tasks as sudo

  tasks:
    - name: Update and upgrade apt packages
      ansible.builtin.apt:
        update_cache: yes # apt update
        upgrade: dist # apt upgrade

    - name: Install Java
      ansible.builtin.apt:
        name: openjdk-21-jre-headless
        state: present

    - name: Create specified minecraft directory
      ansible.builtin.file:
        path: /opt/minecraft
        state: directory

    - name: Download Minecraft server jar
      ansible.builtin.get_url:
        url: "https://piston-data.mojang.com/v1/objects/e6ec2f64e6080b9b5d9b471b291c33cc7f509733/server.jar"
        dest: /opt/minecraft/server.jar

    - name: Accept the Minecraft EULA
      ansible.builtin.copy:
        dest: /opt/minecraft/eula.txt
        content: "eula=true\n"
        owner: ubuntu
        group: ubuntu

    - name: Give ubuntu ownership of the minecraft directory
      ansible.builtin.file:
        path: /opt/minecraft
        state: directory
        owner: ubuntu
        group: ubuntu
        recurse: yes

    - name: Create systemd file
      ansible.builtin.file:
        path: /etc/systemd/system
        state: directory

    - name: Edit systemd service to autostart Minecraft server
      ansible.builtin.copy:
        dest: /etc/systemd/system/minecraft.service
        content: |
          [Unit]
          # Wait for network to be available
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory=/opt/minecraft
          ExecStart=/usr/bin/java -Xmx2G -Xms2G -jar /opt/minecraft/server.jar nogui

          # Gracefully stop server on shutdown (saves world data)
          ExecStop=/bin/kill -s SIGINT $MAINPID

          # Restart service if it crashes
          Restart=on-failure

          # Treat exit codes 0 and 1 as successful (prevents unnecessary restarts)
          SuccessExitStatus=0 1

          [Install]
          WantedBy=multi-user.target
        mode: "644"

    - name: Reload systemd services
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Enable minecraft service
      ansible.builtin.systemd_service:
        name: minecraft.service
        enabled: true

    - name: Start minecraft service
      ansible.builtin.systemd_service:
        name: minecraft.service
        state: started
